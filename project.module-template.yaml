layout: maven-like

settings:
  publishing:
    enabled: true
    group: org.roboquant
    version: 3.1.0
    publishSources: true
    signArtifacts: true
    mavenCentral:
      publishingMode: manual
      enabled: true
    pom:
      url: https://roboquant.org
      scm: https://github.com/neurallayer/roboquant.git
      developers:
        - name: roboquant team
      licenses:
        - name: The Apache License, Version 2.0
          url: https://opensource.org/license/apache-2.0
  kotlin:
    version: 2.4.0

repositories:
  - id: snapshots
    url: https://central.sonatype.com/repository/maven-snapshots/
    publish: true
    credentials:
      file: creds.properties
      usernameKey: username
      passwordKey: password

dependencies:
  - org.jetbrains.kotlin:kotlin-stdlib:2.4.0
  - org.slf4j:slf4j-api:2.1.0-alpha1

test-dependencies:
  - $kotlin.test.junit5
  - org.slf4j:slf4j-simple:2.0.17
