name: CI

on: [push, pull_request]

jobs:
  build:

    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Verify
        run: ./kotlin check -m 'roboquant' -m 'roboquant-avro' -m 'roboquant-charts' -m 'roboquant-questdb' -m 'roboquant-alpaca'

